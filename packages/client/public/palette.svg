<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 900" font-family="system-ui, sans-serif">
  <rect width="780" height="900" fill="#1A1A2E"/>

  <!-- Header -->
  <text x="32" y="48" fill="#FFFFFF" font-size="32" font-weight="600">Duet</text>
  <text x="120" y="48" fill="#4A4A4A" font-size="12" font-weight="500" letter-spacing="1.5" text-transform="uppercase">COLOR SYSTEM</text>
  <text x="32" y="72" fill="#E0E0E0" font-size="12" opacity="0.6">Extracted from the Synaptic Blueprint v1.1</text>

  <!-- Backgrounds -->
  <text x="32" y="120" fill="#457B9D" font-size="11" font-weight="500" letter-spacing="1.8">BACKGROUNDS</text>
  <rect x="32" y="134" width="228" height="110" rx="10" fill="#1A1A2E" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <text x="50" y="168" fill="#FFFFFF" font-size="14" font-weight="600">Midnight</text>
  <text x="50" y="186" fill="rgba(255,255,255,0.45)" font-size="11">Primary background</text>
  <text x="50" y="224" fill="rgba(255,255,255,0.6)" font-size="12" font-family="monospace">#1A1A2E</text>

  <rect x="276" y="134" width="228" height="110" rx="10" fill="#1E1E2E"/>
  <text x="294" y="168" fill="#FFFFFF" font-size="14" font-weight="600">Deep Navy</text>
  <text x="294" y="186" fill="rgba(255,255,255,0.45)" font-size="11">Surface / card</text>
  <text x="294" y="224" fill="rgba(255,255,255,0.6)" font-size="12" font-family="monospace">#1E1E2E</text>

  <rect x="520" y="134" width="228" height="110" rx="10" fill="#4A4A4A"/>
  <text x="538" y="168" fill="#FFFFFF" font-size="14" font-weight="600">Charcoal</text>
  <text x="538" y="186" fill="rgba(255,255,255,0.45)" font-size="11">Borders, dividers</text>
  <text x="538" y="224" fill="rgba(255,255,255,0.6)" font-size="12" font-family="monospace">#4A4A4A</text>

  <!-- Brand Accents -->
  <text x="32" y="284" fill="#457B9D" font-size="11" font-weight="500" letter-spacing="1.8">BRAND ACCENTS</text>
  <rect x="32" y="298" width="228" height="110" rx="10" fill="#457B9D"/>
  <text x="50" y="332" fill="#FFFFFF" font-size="14" font-weight="600">Steel Blue</text>
  <text x="50" y="350" fill="rgba(255,255,255,0.45)" font-size="11">Primary accent / links</text>
  <text x="50" y="388" fill="rgba(255,255,255,0.6)" font-size="12" font-family="monospace">#457B9D</text>

  <rect x="276" y="298" width="228" height="110" rx="10" fill="#2E74B5"/>
  <text x="294" y="332" fill="#FFFFFF" font-size="14" font-weight="600">Ocean</text>
  <text x="294" y="350" fill="rgba(255,255,255,0.45)" font-size="11">Interactive elements</text>
  <text x="294" y="388" fill="rgba(255,255,255,0.6)" font-size="12" font-family="monospace">#2E74B5</text>

  <rect x="520" y="298" width="228" height="110" rx="10" fill="#1F4D78"/>
  <text x="538" y="332" fill="#FFFFFF" font-size="14" font-weight="600">Deep Blue</text>
  <text x="538" y="350" fill="rgba(255,255,255,0.45)" font-size="11">Hover / pressed states</text>
  <text x="538" y="388" fill="rgba(255,255,255,0.6)" font-size="12" font-family="monospace">#1F4D78</text>

  <!-- Semantic -->
  <text x="32" y="448" fill="#457B9D" font-size="11" font-weight="500" letter-spacing="1.8">SEMANTIC</text>
  <rect x="32" y="462" width="228" height="110" rx="10" fill="#E63946"/>
  <text x="50" y="496" fill="#FFFFFF" font-size="14" font-weight="600">Crimson</text>
  <text x="50" y="514" fill="rgba(255,255,255,0.75)" font-size="11">Alerts / destructive</text>
  <text x="50" y="552" fill="rgba(255,255,255,0.6)" font-size="12" font-family="monospace">#E63946</text>

  <rect x="276" y="462" width="228" height="110" rx="10" fill="#A8D8A8"/>
  <text x="294" y="496" fill="#1A1A2E" font-size="14" font-weight="600">Sage</text>
  <text x="294" y="514" fill="rgba(26,26,46,0.55)" font-size="11">Success / User B indicator</text>
  <text x="294" y="552" fill="rgba(26,26,46,0.7)" font-size="12" font-family="monospace">#A8D8A8</text>

  <rect x="520" y="462" width="228" height="110" rx="10" fill="#F1FAEE" stroke="rgba(0,0,0,0.08)" stroke-width="1"/>
  <text x="538" y="496" fill="#1A1A2E" font-size="14" font-weight="600">Frost</text>
  <text x="538" y="514" fill="rgba(26,26,46,0.55)" font-size="11">Soft highlight</text>
  <text x="538" y="552" fill="rgba(26,26,46,0.7)" font-size="12" font-family="monospace">#F1FAEE</text>

  <!-- Text & Surface -->
  <text x="32" y="612" fill="#457B9D" font-size="11" font-weight="500" letter-spacing="1.8">TEXT &amp; SURFACE</text>
  <rect x="32" y="626" width="228" height="110" rx="10" fill="#F5F5F7" stroke="rgba(0,0,0,0.08)" stroke-width="1"/>
  <text x="50" y="660" fill="#1A1A2E" font-size="14" font-weight="600">Cloud</text>
  <text x="50" y="678" fill="rgba(26,26,46,0.55)" font-size="11">Primary text</text>
  <text x="50" y="716" fill="rgba(26,26,46,0.7)" font-size="12" font-family="monospace">#F5F5F7</text>

  <rect x="276" y="626" width="228" height="110" rx="10" fill="#FFFFFF" stroke="rgba(0,0,0,0.08)" stroke-width="1"/>
  <text x="294" y="660" fill="#1A1A2E" font-size="14" font-weight="600">White</text>
  <text x="294" y="678" fill="rgba(26,26,46,0.55)" font-size="11">High-contrast text</text>
  <text x="294" y="716" fill="rgba(26,26,46,0.7)" font-size="12" font-family="monospace">#FFFFFF</text>

  <rect x="520" y="626" width="228" height="110" rx="10" fill="#E0E0E0" stroke="rgba(0,0,0,0.08)" stroke-width="1"/>
  <text x="538" y="660" fill="#1A1A2E" font-size="14" font-weight="600">Silver</text>
  <text x="538" y="678" fill="rgba(26,26,46,0.55)" font-size="11">Secondary text / muted</text>
  <text x="538" y="716" fill="rgba(26,26,46,0.7)" font-size="12" font-family="monospace">#E0E0E0</text>

  <!-- Typefaces -->
  <text x="32" y="786" fill="#457B9D" font-size="11" font-weight="500" letter-spacing="1.8">TYPEFACES</text>
  <text x="32" y="816" fill="#FFFFFF" font-size="24" font-weight="600">Fraunces</text>
  <text x="200" y="816" fill="#4A4A4A" font-size="13">Display / headings</text>
  <text x="32" y="846" fill="#FFFFFF" font-size="20" font-weight="400">DM Sans</text>
  <text x="160" y="846" fill="#4A4A4A" font-size="13">Body / UI</text>
</svg>
