services:
  server:
    build:
      context: .
      target: server
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - DATABASE_PATH=/app/data/duet.db
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
    volumes:
      - duet-data:/app/data

  client:
    build:
      context: .
      target: client
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:8000
      - VITE_WS_URL=ws://localhost:8000
    depends_on:
      - server

volumes:
  duet-data:
